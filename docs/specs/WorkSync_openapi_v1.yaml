
openapi: 3.1.0
info:
  title: WorkSync API
  version: 1.0.0
  summary: WorkSync core REST API contract
  description: |
    차세대 통합 근무관리 시스템 WorkSync의 핵심 API 스펙.
    본 스펙은 실제 구현 시점의 기준 초안이며, scope/RBAC, 멱등성, 감사 로그를 기본 전제로 한다.
servers:
  - url: https://api.worksync.example.com
    description: Production
  - url: https://staging-api.worksync.example.com
    description: Staging

security:
  - bearerAuth: []

tags:
  - name: Auth
  - name: Me
  - name: Organizations
  - name: Sites
  - name: Users
  - name: Schedules
  - name: Clock
  - name: Attendance
  - name: Approvals
  - name: Requests
  - name: Dashboard
  - name: Reports
  - name: Files

paths:
  /v1/auth/login:
    post:
      tags: [Auth]
      summary: 로그인
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 로그인 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/auth/refresh:
    post:
      tags: [Auth]
      summary: 토큰 재발급
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: 재발급 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/me:
    get:
      tags: [Me]
      summary: 내 프로필 및 권한 조회
      responses:
        '200':
          description: 본인 정보
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'

  /v1/account/organizations:
    get:
      tags: [Organizations]
      summary: 접근 가능한 워크스페이스 목록 조회
      responses:
        '200':
          description: 접근 가능한 워크스페이스 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessibleOrganizationListResponse'
    post:
      tags: [Organizations]
      summary: 관리 워크스페이스 생성
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateManagedOrganizationRequest'
      responses:
        '201':
          description: 생성 완료
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManagedOrganizationSummary'

  /v1/account/organizations/{organizationId}:
    patch:
      tags: [Organizations]
      summary: 관리 워크스페이스 수정
      parameters:
        - $ref: '#/components/parameters/organizationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateManagedOrganizationRequest'
      responses:
        '200':
          description: 수정 완료
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManagedOrganizationSummary'

  /v1/files/presign-upload:
    post:
      tags: [Files]
      summary: 파일 업로드용 presigned URL 발급
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PresignUploadRequest'
      responses:
        '200':
          description: 업로드 URL 발급
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PresignUploadResponse'

  /v1/files/complete-upload:
    post:
      tags: [Files]
      summary: 업로드 완료 통지
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompleteUploadRequest'
      responses:
        '201':
          description: 파일 메타데이터 생성 완료
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileObject'

  /v1/orgs/{orgId}/sites:
    get:
      tags: [Sites]
      summary: 사업장 목록 조회
      parameters:
        - $ref: '#/components/parameters/orgId'
        - in: query
          name: status
          schema:
            type: string
            enum: [ACTIVE, INACTIVE, CLOSED]
      responses:
        '200':
          description: 사업장 목록
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Site'
                  nextCursor:
                    type: string
                    nullable: true
    post:
      tags: [Sites]
      summary: 사업장 생성
      parameters:
        - $ref: '#/components/parameters/orgId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSiteRequest'
      responses:
        '201':
          description: 생성 완료
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Site'

  /v1/orgs/{orgId}/sites/{siteId}/auth-policy:
    put:
      tags: [Sites]
      summary: 사업장 인증 정책 저장
      parameters:
        - $ref: '#/components/parameters/orgId'
        - $ref: '#/components/parameters/siteId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SiteAuthPolicy'
      responses:
        '200':
          description: 저장 완료
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SiteAuthPolicy'

  /v1/orgs/{orgId}/users:
    get:
      tags: [Users]
      summary: 사용자 목록 조회
      parameters:
        - $ref: '#/components/parameters/orgId'
        - in: query
          name: unitId
          schema:
            type: string
        - in: query
          name: employmentStatus
          schema:
            type: string
            enum: [ACTIVE, LEAVE, RETIRED, INACTIVE]
      responses:
        '200':
          description: 사용자 목록
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
                  nextCursor:
                    type: string
                    nullable: true
    post:
      tags: [Users]
      summary: 사용자 생성
      parameters:
        - $ref: '#/components/parameters/orgId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: 생성 완료
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  /v1/orgs/{orgId}/schedule-templates:
    get:
      tags: [Schedules]
      summary: 스케줄 템플릿 조회
      parameters:
        - $ref: '#/components/parameters/orgId'
      responses:
        '200':
          description: 템플릿 목록
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/ScheduleTemplate'
    post:
      tags: [Schedules]
      summary: 스케줄 템플릿 생성
      parameters:
        - $ref: '#/components/parameters/orgId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateScheduleTemplateRequest'
      responses:
        '201':
          description: 생성 완료
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleTemplate'

  /v1/orgs/{orgId}/schedule-assignments:
    post:
      tags: [Schedules]
      summary: 스케줄 배포
      parameters:
        - $ref: '#/components/parameters/orgId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateScheduleAssignmentRequest'
      responses:
        '201':
          description: 배포 완료
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleAssignment'

  /v1/users/{userId}/shift-instances:
    get:
      tags: [Schedules]
      summary: 사용자 shift instance 조회
      parameters:
        - $ref: '#/components/parameters/userId'
        - in: query
          name: dateFrom
          required: true
          schema:
            type: string
            format: date
        - in: query
          name: dateTo
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: shift 목록
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/ShiftInstance'

  /v1/clock/validate:
    post:
      tags: [Clock]
      summary: 출퇴근 이벤트 사전 검증
      parameters:
        - $ref: '#/components/parameters/idempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClockValidationRequest'
      responses:
        '200':
          description: 검증 결과
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClockValidationResponse'
        '409':
          description: 전이 불가 또는 정책 위반
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/clock/events:
    post:
      tags: [Clock]
      summary: 출퇴근 이벤트 생성
      parameters:
        - $ref: '#/components/parameters/idempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateClockEventRequest'
      responses:
        '201':
          description: 이벤트 생성 완료
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateClockEventResponse'
        '409':
          description: 정책 위반 / 중복 / 상태 전이 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/attendance/sessions:
    get:
      tags: [Attendance]
      summary: 근태 세션 조회
      parameters:
        - in: query
          name: userId
          schema:
            type: string
        - in: query
          name: dateFrom
          schema:
            type: string
            format: date
        - in: query
          name: dateTo
          schema:
            type: string
            format: date
        - in: query
          name: siteId
          schema:
            type: string
      responses:
        '200':
          description: 세션 목록
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/AttendanceSession'

  /v1/attendance/sessions/{sessionId}:
    get:
      tags: [Attendance]
      summary: 근태 세션 상세 조회
      parameters:
        - $ref: '#/components/parameters/sessionId'
      responses:
        '200':
          description: 세션 상세
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceSessionDetail'

  /v1/attendance/sessions/{sessionId}/adjust:
    patch:
      tags: [Attendance]
      summary: 관리자 수동 정정
      parameters:
        - $ref: '#/components/parameters/sessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdjustAttendanceSessionRequest'
      responses:
        '200':
          description: 정정 완료
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceSession'

  /v1/approvals/inbox:
    get:
      tags: [Approvals]
      summary: 승인 Inbox 조회
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [PENDING, APPROVED, REJECTED, CANCELLED]
        - in: query
          name: requestType
          schema:
            type: string
            enum: [OVERTIME, SCHEDULE_CHANGE, LEAVE, ATTENDANCE_CORRECTION, WFH]
      responses:
        '200':
          description: 승인 목록
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/ApprovalRequest'

  /v1/approvals/{approvalRequestId}/approve:
    post:
      tags: [Approvals]
      summary: 승인 처리
      parameters:
        - $ref: '#/components/parameters/approvalRequestId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalDecisionRequest'
      responses:
        '200':
          description: 승인 완료
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalRequest'

  /v1/approvals/{approvalRequestId}/reject:
    post:
      tags: [Approvals]
      summary: 반려 처리
      parameters:
        - $ref: '#/components/parameters/approvalRequestId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalDecisionRequest'
      responses:
        '200':
          description: 반려 완료
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalRequest'

  /v1/overtime-requests:
    post:
      tags: [Requests]
      summary: 연장근로 요청 생성
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOvertimeRequest'
      responses:
        '201':
          description: 생성 완료
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OvertimeRequest'

  /v1/schedule-change-requests:
    post:
      tags: [Requests]
      summary: 스케줄 변경 요청 생성
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateScheduleChangeRequest'
      responses:
        '201':
          description: 생성 완료
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleChangeRequest'

  /v1/leave-requests:
    post:
      tags: [Requests]
      summary: 휴가 요청 생성
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLeaveRequest'
      responses:
        '201':
          description: 생성 완료
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaveRequest'

  /v1/attendance-corrections:
    post:
      tags: [Requests]
      summary: 근태 정정 요청 생성
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAttendanceCorrectionRequest'
      responses:
        '201':
          description: 생성 완료
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalRequest'

  /v1/dashboard/live-summary:
    get:
      tags: [Dashboard]
      summary: 실시간 대시보드 요약
      parameters:
        - in: query
          name: date
          required: true
          schema:
            type: string
            format: date
        - in: query
          name: unitId
          schema:
            type: string
        - in: query
          name: siteId
          schema:
            type: string
      responses:
        '200':
          description: 요약 정보
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardLiveSummary'

  /v1/reports/attendance-summary/export:
    post:
      tags: [Reports]
      summary: 근태 요약 리포트 export 요청
      parameters:
        - $ref: '#/components/parameters/idempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateExportJobRequest'
      responses:
        '202':
          description: export job 생성
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportJob'

  /v1/reports/export-jobs/{jobId}:
    get:
      tags: [Reports]
      summary: export job 조회
      parameters:
        - $ref: '#/components/parameters/jobId'
      responses:
        '200':
          description: job 조회
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportJob'

components:
  parameters:
    organizationId:
      in: path
      name: organizationId
      required: true
      schema:
        type: string
    orgId:
      in: path
      name: orgId
      required: true
      schema:
        type: string
    siteId:
      in: path
      name: siteId
      required: true
      schema:
        type: string
    userId:
      in: path
      name: userId
      required: true
      schema:
        type: string
    sessionId:
      in: path
      name: sessionId
      required: true
      schema:
        type: string
    approvalRequestId:
      in: path
      name: approvalRequestId
      required: true
      schema:
        type: string
    jobId:
      in: path
      name: jobId
      required: true
      schema:
        type: string
    idempotencyKey:
      in: header
      name: Idempotency-Key
      required: false
      schema:
        type: string

  responses:
    Unauthorized:
      description: 인증 실패
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    LoginResponse:
      type: object
      required: [accessToken, refreshToken, expiresInSeconds, user]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresInSeconds:
          type: integer
        user:
          $ref: '#/components/schemas/User'

    MeResponse:
      type: object
      required: [user, roles]
      properties:
        user:
          $ref: '#/components/schemas/User'
        roles:
          type: array
          items:
            $ref: '#/components/schemas/ScopedRole'

    ScopedRole:
      type: object
      required: [roleCode, scopeType, scopeId]
      properties:
        roleCode:
          type: string
          example: UNIT_MANAGER
        scopeType:
          type: string
          enum: [ORGANIZATION, UNIT, SITE, SELF]
        scopeId:
          type: string

    User:
      type: object
      required:
        [id, organizationId, employeeNo, name, employmentStatus, joinDate, timezone, primaryUnitId, workPolicyId]
      properties:
        id:
          type: string
        organizationId:
          type: string
        employeeNo:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
          nullable: true
        phone:
          type: string
          nullable: true
        employmentStatus:
          type: string
          enum: [ACTIVE, LEAVE, RETIRED, INACTIVE]
        joinDate:
          type: string
          format: date
        timezone:
          type: string
          example: Asia/Seoul
        primaryUnitId:
          type: string
        defaultSiteId:
          type: string
          nullable: true
        trackType:
          type: string
          enum: [FIXED, STAGGERED, FLEXIBLE_2W, FLEXIBLE_3M, SELECTIVE, SHIFT, WFH, MIXED]
          nullable: true
        workPolicyId:
          type: string

    CreateUserRequest:
      type: object
      required: [employeeNo, name, joinDate, timezone, primaryUnitId, workPolicyId]
      properties:
        employeeNo:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        joinDate:
          type: string
          format: date
        timezone:
          type: string
          default: Asia/Seoul
        primaryUnitId:
          type: string
        defaultSiteId:
          type: string
          nullable: true
        trackType:
          type: string
          enum: [FIXED, STAGGERED, FLEXIBLE_2W, FLEXIBLE_3M, SELECTIVE, SHIFT, WFH, MIXED]
        workPolicyId:
          type: string

    ManagedOrganizationSummary:
      type: object
      required: [id, code, name]
      properties:
        id:
          type: string
        code:
          type: string
        name:
          type: string
        isManaged:
          type: boolean
        siteCount:
          type: integer
        userCount:
          type: integer

    AccessibleOrganizationListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ManagedOrganizationSummary'

    CreateManagedOrganizationRequest:
      type: object
      required: [code, name]
      properties:
        code:
          type: string
        name:
          type: string

    UpdateManagedOrganizationRequest:
      type: object
      properties:
        code:
          type: string
        name:
          type: string

    Site:
      type: object
      required: [id, organizationId, code, name, status, timezone]
      properties:
        id:
          type: string
        organizationId:
          type: string
        code:
          type: string
        name:
          type: string
        status:
          type: string
          enum: [ACTIVE, INACTIVE, CLOSED]
        timezone:
          type: string
        addressLine1:
          type: string
          nullable: true
        addressLine2:
          type: string
          nullable: true
        lat:
          type: number
          format: double
          nullable: true
        lng:
          type: number
          format: double
          nullable: true
        geofenceRadiusMeters:
          type: integer
          nullable: true

    CreateSiteRequest:
      type: object
      required: [code, name, status, timezone]
      properties:
        code:
          type: string
        name:
          type: string
        status:
          type: string
          enum: [ACTIVE, INACTIVE, CLOSED]
        timezone:
          type: string
          default: Asia/Seoul
        addressLine1:
          type: string
        addressLine2:
          type: string
        lat:
          type: number
          format: double
        lng:
          type: number
          format: double
        geofenceRadiusMeters:
          type: integer
