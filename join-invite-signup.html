<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WorkMate 초대 가입</title>
    <link rel="icon" href="data:," />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles/pages/auth.css" />
  </head>
  <body data-page="join-invite-signup">
    <div class="app-shell auth-locked" id="appShell">
      <div class="auth-background-media" aria-hidden="true">
        <img class="auth-background-media-image" src="/client/assets/bg.png" alt="" />
      </div>
      <main class="content-area">
        <div class="login-shell login-single-shell workmate-auth-shell signup-shell">
          <div class="login-brand-lockup" aria-hidden="true">
            <img class="login-brand-mark" src="/client/assets/logo.png" alt="" width="42" height="42" />
            <img class="login-brand-wordmark" src="/client/assets/workmate-wordmark.png" alt="" />
          </div>
          <article class="login-panel-card login-stage-panel login-composition-panel signup-composition-panel">
            <div class="login-stage-panel-inner">
              <form class="login-stage-form login-form login-composition-form signup-composition-form" id="join-invite-signup-form">
                <h3 class="login-composition-title">초대 가입</h3>
                <p class="login-stage-description signup-stage-description">
                  초대받은 이메일과 이름은 변경할 수 없습니다. 비밀번호를 설정하면 합류 확인 단계로 이동합니다.
                </p>

                <div class="field login-field">
                  <label for="join-signup-email">이메일</label>
                  <input id="join-signup-email" type="email" value="" readonly required />
                </div>

                <div class="field login-field">
                  <label for="join-signup-name">이름</label>
                  <input id="join-signup-name" type="text" value="" readonly required />
                </div>

                <div class="field login-field">
                  <label for="join-signup-password">비밀번호</label>
                  <input id="join-signup-password" type="password" placeholder="8자 이상" required />
                </div>

                <div class="field login-field">
                  <label for="join-signup-confirm-password">비밀번호 재확인</label>
                  <input id="join-signup-confirm-password" type="password" placeholder="비밀번호 재입력" required />
                </div>

                <p class="login-error hidden" id="join-signup-error" aria-live="polite"></p>
                <button class="primary-button login-submit-button" type="submit">가입 후 합류 확인</button>
                <p class="workmate-auth-footer">
                  이미 계정이 있으면 <a href="/login" id="join-signup-login-link">로그인</a>으로 이동하세요.
                </p>
              </form>
            </div>
          </article>
        </div>
      </main>
    </div>

    <script src="/client/boot/asset-manifest.js"></script>
    <script src="/client/boot/load-page-assets.js"></script>
  </body>
</html>
